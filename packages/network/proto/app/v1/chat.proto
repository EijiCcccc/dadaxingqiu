syntax = "proto3";

package app.v1;

option go_package = "dada-backendgo/gen/proto/app/v1;appv1";

message GetChatSettingsResponse {
  string peer_user_id = 1;
  string nickname = 2;
  string remark_name = 3;
  string display_name = 4;
  string avatar_url = 5;
  bool is_pinned = 6;
  int64 pinned_at = 7;
  string chat_background_url = 8;
  bool is_following = 9;
  bool is_followed_by = 10;
  bool is_mutual_follow = 11;
  int64 intimacy = 12;
}

message UpdateChatPinRequest {
  bool is_pinned = 1;
}

message UpdateChatPinResponse {
  bool is_pinned = 1;
  int64 pinned_at = 2;
}

message UpdateUserRemarkRequest {
  string remark_name = 1;
}

message UpdateUserRemarkResponse {
  string target_user_id = 1;
  string remark_name = 2;
  string display_name = 3;
}

message CreateChatBackgroundUploadRequest {
  string file_name = 1;
  string content_type = 2;
}

message CreateChatBackgroundUploadResponse {
  string object_key = 1;
  string upload_url = 2;
  string public_url = 3;
  int64 expires_in = 4;
}

message UpdateChatBackgroundRequest {
  string background_url = 1;
}

message UpdateChatBackgroundResponse {
  string background_url = 1;
}

message DeleteChatConversationRequest {}

message DeleteChatConversationResponse {
  bool deleted = 1;
  int64 deleted_at = 2;
}
