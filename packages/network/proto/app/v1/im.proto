syntax = "proto3";

package app.v1;

option go_package = "dada-backendgo/gen/proto/app/v1;appv1";

message GetIMSessionResponse {
  int64 sdk_app_id = 1;
  string user_id = 2;
  string user_sig = 3;
  int64 expire_at = 4;
  string nickname = 5;
  string avatar_url = 6;
}

message IMConversationMeta {
  string user_id = 1;
  string nickname = 2;
  string remark_name = 3;
  string display_name = 4;
  int32 gender = 5;
  string avatar_url = 6;
  int64 intimacy = 7;
  bool is_pinned = 8;
  int64 pinned_at = 9;
  string chat_background_url = 10;
  bool is_following = 11;
  bool is_followed_by = 12;
  bool is_mutual_follow = 13;
  bool is_deleted = 14;
  int64 deleted_at = 15;
}

message GetIMConversationMetaResponse {
  repeated IMConversationMeta items = 1;
}

message GetIMIntimacyResponse {
  string peer_user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
  int64 sent_count = 4;
  int64 received_count = 5;
  int64 intimacy = 6;
}
