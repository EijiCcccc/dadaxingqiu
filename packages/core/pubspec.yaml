name: core
description: 核心包 - 主题、路由、常量、工具
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  logger: ^2.7.0
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.2
  flutter_gen_runner: 5.12.0
  build_runner: 2.10.2
  network:
    path: ../network



flutter:
  uses-material-design: true
  assets:
    - assets/


flutter_gen:
  output: lib/src/gen/
  assets:
    outputs:
      package_parameter_enabled: true
  integrations:
    lottie: true